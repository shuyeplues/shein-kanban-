        .count-badge{background:#f5f5f5;padding:2px 5px;border-radius:6px;font-size:9px;color:#666}
        .section-rate{font-size:9px;color:#999;margin-left:4px}
        .cards{display:grid;gap:6px;grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
        .card{border:2px solid #eee;border-radius:6px;padding:6px;position:relative}
        .card.out{border-color:#ff4d4f;background:linear-gradient(135deg,#fff1f0,white)}
        .card.low{border-color:#fa8c16;background:linear-gradient(135deg,#fff7e6,white)}
        .card.production{background:linear-gradient(135deg,#f5f5f5,white)}
        .card.complete{background:#e8f8e8;border-color:#52c41a}
        .card.complete::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(180,180,180,0.15);border-radius:4px;pointer-events:none;z-index:1}
        .card.complete>{*}{position:relative;z-index:2;opacity:0.5}
        .card-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;background:#f9f9f9}
        .card-img-placeholder{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:5px;color:#999;font-size:9px}
        .card-code{font-weight:600;font-size:10px;margin:4px 0 1px}
        .card-color{font-size:9px;color:#666}
        .card-sizes{margin-top:2px}
        .card-sizes-label{font-size:8px;color:#999}
        .card-sizes-value{font-size:9px;color:#333;font-weight:500}
        .card-loss{background:#ff4d4f;color:white;padding:1px 4px;border-radius:4px;font-size:8px;font-weight:500}
        .card-urgency{background:#fa8c16;color:white;padding:1px 4px;border-radius:4px;font-size:8px;font-weight:500}
        .card-actions{margin-top:5px;display:flex;flex-direction:column;gap:2px}
        .action-btn{padding:3px 5px;border:none;border-radius:3px;cursor:pointer;font-size:9px;font-weight:500;width:100%}
        .action-btn.production{background:#d9d9d9;color:#666}
        .action-btn.production:hover:not(:disabled){background:#8c8c8c;color:white}
        .action-btn.production.done{background:#8c8c8c;color:white}
        .action-btn.warehouse{background:#d9d9d9;color:#666}
        .action-btn.warehouse:hover:not(:disabled){background:#52c41a;color:white}
        .action-btn.warehouse.done{background:#52c41a;color:white}
        .action-btn:disabled{opacity:0.5;cursor:not-allowed}
        .card-log{margin-top:4px;padding-top:4px;border-top:1px dashed #eee;font-size:8px;color:#999}
        .empty-state{text-align:center;padding:25px;color:#999;font-size:10px}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:10px}
        .modal.show{display:flex}
        .modal-content{background:white;border-radius:8px;padding:14px;width:100%;max-width:280px}
        .modal-title{font-size:13px;font-weight:600;margin-bottom:8px;text-align:center}
        .modal-input{width:100%;padding:7px 8px;border:1px solid #ddd;border-radius:5px;font-size:11px;margin-bottom:6px}
        .modal-input:focus{outline:none;border-color:#667eea}
        .modal-note{font-size:9px;color:#999;margin-top:-4px;margin-bottom:6px}
        .modal-actions{display:flex;gap:5px}
        .modal-btn{flex:1;padding:7px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500}
        .modal-btn.cancel{background:#f0f0f0;color:#666}
        .modal-btn.confirm{background:#667eea;color:white}
        .footer{text-align:center;padding:10px;color:#999;font-size:9px}

            localStorage.setItem('skc_status_v5', JSON.stringify(statusData));
        }
        
        function updateStatus(skc, type, name, note) {
            if (!statusData[skc]) statusData[skc] = {production: null, warehouse: null};
            var now = new Date();
            var timeStr = (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
            if (type === 'production') {
                statusData[skc].production = {name: name, note: note, time: timeStr};
            } else {
                statusData[skc].warehouse = {name: name, note: note, time: timeStr};
            }
            saveStatus();
        }
        
        function renderStats() {
            var pendingOut = 0, pendingLow = 0, prodOut = 0, prodLow = 0, compOut = 0, compLow = 0;
            ['urerem','saoyangyu'].forEach(function(shop) {
                allData[shop].out.concat(allData[shop].low).forEach(function(item) {
                    var s = getStatus(item.skc);
                    if (s.warehouse) {
                        item.type === 'out' ? compOut++ : compLow++;
                    } else if (s.production) {
                        item.type === 'out' ? prodOut++ : prodLow++;
                    } else {
                        item.type === 'out' ? pendingOut++ : pendingLow++;
                    }
                });
            });
            document.getElementById('stats').innerHTML = 
                '<div class="stat-card"><div class="num">' + pendingOut + '</div><div class="label">断货待处理</div></div>' +
                '<div class="stat-card"><div class="num">' + pendingLow + '</div><div class="label">预警待处理</div></div>' +
                '<div class="stat-card"><div class="num">' + (prodOut+prodLow) + '</div><div class="label">生产中</div></div>' +
                '<div class="stat-card"><div class="num">' + (compOut+compLow) + '</div><div class="label">已完成</div></div>';
            
            var totalOut = allData.urerem.out.length + allData.saoyangyu.out.length;
            var totalLow = allData.urerem.low.length + allData.saoyangyu.low.length;
            var total = totalOut + totalLow;
            var totalSku = 259;
            document.getElementById('subtitle').textContent = '断货率:' + (totalOut/totalSku*100).toFixed(1) + '% | 预警率:' + (totalLow/totalSku*100).toFixed(1) + '%';
            document.getElementById('rate-out').textContent = total > 0 ? '断货率:' + (totalOut/total*100).toFixed(0) + '%' : '';
            document.getElementById('rate-low').textContent = total > 0 ? '预警率:' + (totalLow/total*100).toFixed(0) + '%' : '';
        }
        
        function getFiltered(type) {
            var items = currentShop === 'all' ? allData.urerem[type].concat(allData.saoyangyu[type]) : allData[currentShop][type];
            if (currentStatus !== 'all') {
                items = items.filter(function(item) {
                    var s = getStatus(item.skc);
                    if (currentStatus === 'complete') return s.warehouse;
                    if (currentStatus === 'production') return s.production && !s.warehouse;
                    return !s.production && !s.warehouse;
                });
            }
            return items;
        }
        
        function renderCards(type) {
            var items = getFiltered(type);
            document.getElementById('count-' + type).textContent = items.length + '款';
            if (items.length === 0) {
                document.getElementById('cards-' + type).innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }
            var html = '';
            items.forEach(function(item) {
                html += renderCard(item);
            });
            document.getElementById('cards-' + type).innerHTML = html;
        }
        
        function renderCard(item) {
            var s = getStatus(item.skc);
            var isProduction = s.production !== null;
            var isComplete = s.warehouse !== null;
            var cardClass = item.type === 'out' ? 'out' : 'low';
            if (isProduction && !isComplete) cardClass = 'production';
            if (isComplete) cardClass = 'complete';
            
            var value = item.type === 'out' ? item.lossSales.toFixed(1) : (item.urgency || 0).toFixed(1);
            var imgHtml = item.picUrl ? '<img class="card-img" src="' + item.picUrl + '" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">' : '';
            var placeholder = '<div class="card-img-placeholder" style="' + (item.picUrl ? 'display:none' : '') + '">无图</div>';
            
            var pBtnClass = isProduction && !isComplete ? 'production done' : 'production';
            var pBtnText = isProduction && !isComplete ? '✓' : '🏭';
            var wBtnClass = isComplete ? 'warehouse done' : 'warehouse';
            var wBtnText = isComplete ? '✓' : '📦';
            
            var logHtml = '';
            if (s.production) logHtml += '<div>🏭 ' + (s.production.name || '已确认') + '</div>';
            if (s.warehouse) logHtml += '<div>📦 ' + (s.warehouse.name || '已确认') + '</div>';
            
            return '<div class="card ' + cardClass + '">' +
                (isComplete ? '' : '<span class="' + (item.type === 'out' ? 'card-loss' : 'card-urgency') + '">' + value + '</span>') +
                imgHtml + placeholder +
                '<div class="card-code">[' + SHOPS[item.shop] + '] ' + item.supplierCode + '</div>' +
                '<div class="card-color">' + item.color + '</div>' +
                '<div class="card-sizes"><div class="card-sizes-label">' + (item.type === 'out' ? '断' : '预') + '码</div><div class="card-sizes-value">' + item.sizes.join(',') + '</div></div>' +
                (item.minStockDays ? '<div style="color:#fa8c16;font-size:8px">⏰' + item.minStockDays + '天</div>' : '') +
                '<div class="card-actions">' +
                '<button class="action-btn ' + pBtnClass + '" onclick="openModal(\'' + item.skc + '\',\'production\')" ' + (isComplete ? 'disabled' : '') + '>' + pBtnText + '生产</button>' +
                '<button class="action-btn ' + wBtnClass + '" onclick="openModal(\'' + item.skc + '\',\'warehouse\')" ' + (!isProduction || isComplete ? 'disabled' : '') + '>' + wBtnText + '仓库</button>' +
                '</div>' +
                (logHtml ? '<div class="card-log">' + logHtml + '</div>' : '') +
                '</div>';
        }
        
        function openModal(skc, type) {
            currentAction = {skc: skc, type: type};
            document.getElementById('modalTitle').textContent = type === 'production' ? '确认生产完成' : '确认仓库完成';
            document.getElementById('confirmName').value = '';
            document.getElementById('confirmNote').value = '';
            document.getElementById('confirmModal').classList.add('show');
            document.getElementById('confirmName').focus();
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            currentAction = null;
        }
        
        function confirmAction() {
            var name = document.getElementById('confirmName').value.trim();
            var note = document.getElementById('confirmNote').value.trim();
            updateStatus(currentAction.skc, currentAction.type, name, note);
            closeModal();
            renderStats();
            renderCards('out');
            renderCards('low');
        }
        
        document.querySelectorAll('.shop-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('.shop-btn').forEach(function(b){b.classList.remove('active')});
                btn.classList.add('active');
                currentShop = btn.dataset.shop;
                renderStats();
                renderCards('out');
                renderCards('low');
            };
        });
        
        document.querySelectorAll('.status-btn').forEach(function(btn) {
            btn.onclick = function() {
                document.querySelectorAll('.status-btn').forEach(function(b){b.classList.remove('active')});
                btn.classList.add('active');
                currentStatus = btn.dataset.status;
                renderCards('out');
                renderCards('low');
            };
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
        
        renderStats();
        renderCards('out');
        renderCards('low');
    </script>
</body>
</html>
