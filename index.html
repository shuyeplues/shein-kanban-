<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEIN OBM 断货预警交接系统 V1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .header .subtitle { opacity: 0.9; font-size: 14px; }
        
        .stats { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 8px; text-align: center; }
        .stat-card .num { font-size: 28px; font-weight: bold; }
        .stat-card .label { font-size: 12px; opacity: 0.9; }
        
        .filters { background: white; padding: 15px 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #eee; }
        .filter-group { display: flex; gap: 8px; align-items: center; }
        .filter-label { font-size: 13px; color: #666; }
        .filter-btn { padding: 8px 16px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .filter-btn:hover { border-color: #667eea; color: #667eea; }
        .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
        
        .shop-tabs { display: flex; gap: 10px; }
        .shop-tab { padding: 10px 20px; border: none; background: #f0f0f0; border-radius: 8px; cursor: pointer; font-weight: 500; }
        .shop-tab.active { background: #667eea; color: white; }
        
        .container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-title { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .section-title .dot { width: 10px; height: 10px; border-radius: 50%; }
        .section-title .dot.red { background: #ff4d4f; }
        .section-title .dot.orange { background: #fa8c16; }
        .count-badge { background: #f0f0f0; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #666; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        
        .card { border: 2px solid #eee; border-radius: 10px; padding: 15px; transition: all 0.3s; position: relative; }
        .card.out { border-color: #ff4d4f; background: linear-gradient(135deg, #fff1f0 0%, white 100%); }
        .card.low { border-color: #fa8c16; background: linear-gradient(135deg, #fff7e6 0%, white 100%); }
        .card.production { background: linear-gradient(135deg, #f5f5f5 0%, white 100%); }
        .card.complete { background: linear-gradient(135deg, #f6ffed 0%, white 100%); border-color: #52c41a; }
        
        .card-img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; background: #f9f9f9; }
        .card-img-placeholder { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; border-radius: 8px; color: #999; font-size: 13px; }
        
        .card-code { font-weight: 600; font-size: 15px; margin: 10px 0 5px; }
        .card-color { font-size: 13px; color: #666; }
        .card-sizes { margin-top: 8px; }
        .card-sizes-label { font-size: 12px; color: #999; }
        .card-sizes-value { font-size: 13px; color: #333; font-weight: 500; margin-top: 3px; }
        
        .card-loss { position: absolute; top: 10px; right: 10px; background: #ff4d4f; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .card.out .card-loss { background: #ff4d4f; }
        .card.low .card-loss { background: #fa8c16; }
        
        .card-urgency { position: absolute; top: 10px; right: 10px; background: #fa8c16; color: white; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        
        .card-actions { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .action-row { display: flex; gap: 8px; align-items: center; }
        .action-label { font-size: 12px; color: #666; width: 60px; }
        .action-btn { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .action-btn.production { background: #d9d9d9; color: #666; }
        .action-btn.production:hover { background: #8c8c8c; color: white; }
        .action-btn.production.done { background: #8c8c8c; color: white; }
        .action-btn.warehouse { background: #d9d9d9; color: #666; }
        .action-btn.warehouse:hover { background: #52c41a; color: white; }
        .action-btn.warehouse.done { background: #52c41a; color: white; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .card-log { margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; font-size: 11px; color: #999; }
        .log-item { margin: 4px 0; }
        
        .card-note { margin-top: 8px; }
        .note-input { width: 100%; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; resize: none; }
        .note-input:focus { outline: none; border-color: #667eea; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 25px; width: 90%; max-width: 400px; }
        .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
        .modal-input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
        .modal-input:focus { outline: none; border-color: #667eea; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .modal-btn.cancel { background: #f0f0f0; color: #666; }
        .modal-btn.confirm { background: #667eea; color: white; }
        
        .footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SHEIN OBM 断货预警交接系统 V1.0</h1>
        <div class="subtitle">UREEM x SAOYANGYU 双店铺 | 生产+仓库两阶段确认</div>
        <div class="stats" id="stats"></div>
    </div>
    
    <div class="filters">
        <div class="shop-tabs">
            <button class="shop-tab active" data-shop="all">全部店铺</button>
            <button class="shop-tab" data-shop="urerem">UREEM</button>
            <button class="shop-tab" data-shop="saoyangyu">SAOYANGYU</button>
        </div>
        <div class="filter-group">
            <span class="filter-label">状态：</span>
            <button class="filter-btn active" data-status="all">全部</button>
            <button class="filter-btn" data-status="pending">待处理</button>
            <button class="filter-btn" data-status="production">生产中</button>
            <button class="filter-btn" data-status="complete">已完成</button>
        </div>
    </div>
    
    <div class="container">
        <div class="section" id="section-out">
            <div class="section-header">
                <div class="section-title"><span class="dot red"></span> 已断货预警</div>
                <span class="count-badge" id="count-out">0 款</span>
            </div>
            <div class="cards" id="cards-out"></div>
        </div>
        
        <div class="section" id="section-low">
            <div class="section-header">
                <div class="section-title"><span class="dot orange"></span> 即将断码预警</div>
                <span class="count-badge" id="count-low">0 款</span>
            </div>
            <div class="cards" id="cards-low"></div>
        </div>
    </div>
    
    <div class="footer">数据来源：每日08:30自动同步 | 刷新页面查看最新数据</div>
    
    <!-- 打勾确认弹窗 -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">确认操作</div>
            <input type="text" class="modal-input" id="confirmName" placeholder="请输入你的名字">
            <textarea class="modal-input" id="confirmNote" placeholder="备注（选填）" rows="3"></textarea>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" onclick="confirmAction()">确认</button>
            </div>

                low: [
                    { supplierCode: '6738', skc: 'sz25021596171328006', picUrl: 'https://img.ltwebstatic.com/images3_spmp/2025/03/20/90/17424682868778eebc47d143030072407e59974810.jpg', color: '卡其色', sizes: ['S', 'M', 'L'], minStockDays: 1.0, urgency: 11.3 },
                    { supplierCode: '6605', skc: 'sz2406283173202962', picUrl: 'https://img.ltwebstatic.com/images3_spmp/2025/02/26/4c/1740556595108f526144e2a4d240521a05b5710ac1.jpg', color: '多色', sizes: ['L', 'XL'], minStockDays: 0.3, urgency: 6.1 },
                    { supplierCode: '6597-大码', skc: 'sz2408084286487871', picUrl: 'https://img.ltwebstatic.com/images3_spmp/2024/08/08/7f/1723083283994f0e4ece4505792e1c66f225d65c2c.jpg', color: '黑白色', sizes: ['1XL'], minStockDays: 0.2, urgency: 4.7 },
                    { supplierCode: '6597', skc: 'sz2406280900144465', picUrl: 'http://img.ltwebstatic.com/images3_pi/2024/07/09/2f/172051523139abe3b94478999e1935bda96ba7fb33.jpg', color: '白色', sizes: ['XL'], minStockDays: 2.0, urgency: 2.9 },
                    { supplierCode: '6805', skc: 'sz25040722918442117', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/07/22/9a/175315400322f61fb58ea110d3a86b8db08777dfd1.jpg', color: '卡其色', sizes: ['S', 'L'], minStockDays: 3.4, urgency: 2.6 },
                    { supplierCode: '6805', skc: 'sz25040722918448288', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/05/23/17/174796647093b4961ca1cdcd168c1cf04defa91ba4.jpg', color: '玫红色', sizes: ['M'], minStockDays: 0.3, urgency: 2.6 },

                    { supplierCode: 'W05301', skc: 'sz25040722873221113', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/04/07/c6/1744012371deadc89dffd73cc7aec45ec787b91efe.jpg', color: '白色', sizes: ['0XL', '1XL'], minStockDays: 1.2, urgency: 2.3 },
                    { supplierCode: '6805', skc: 'sz25040722918488296', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/07/30/c0/175383864514e7fb8dc94c593f0641140b948c95b6.jpg', color: '蓝色', sizes: ['M'], minStockDays: 0.6, urgency: 2.3 },
                    { supplierCode: '6786', skc: 'sz25032197746312768', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2026/04/08/70/177561948763cbeafe6eaefb9d2e0daf4a94fdc5dd_square.jpg', color: '淡蓝色', sizes: ['M'], minStockDays: 2.4, urgency: 2.2 }
                ].map(item => ({...item, shop: 'urerem', type: 'low'}))
            },
            saoyangyu: {
                out: [
                    { supplierCode: '6924', skc: 'sz25072999002436009', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/08/26/b1/175620076417d9723a3f54ac79933fe53536a81e0a.jpg', color: '黑色', sizes: ['L'], lossSales: 4.0 },
                    { supplierCode: '6973', skc: 'sz25070853351973574', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2026/01/17/25/176861555073007f34108eacb9b8a96722a8befd5b.jpg', color: '紫色', sizes: ['XS'], lossSales: 0.0 }
                ].map(item => ({...item, shop: 'saoyangyu', type: 'out'})),
                low: [
                    { supplierCode: '6924', skc: 'sz25072999002436009', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/08/26/b1/175620076417d9723a3f54ac79933fe53536a81e0a.jpg', color: '黑色', sizes: ['S', 'M'], minStockDays: 0.2, urgency: 12.2 },
                    { supplierCode: '6924', skc: 'sz260105153950770355156', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2026/03/31/71/1774951565136ee53c5ec0c90e89a93e1da0914925.jpg', color: '黑色', sizes: ['Petite XS', 'Petite S'], minStockDays: 0.5, urgency: 6.7 },
                    { supplierCode: '6973-矮款', skc: 'sz251105543146124711', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/11/05/df/176231165384792c82fdb70b74af915a0a7b328b15.jpg', color: '蓝色', sizes: ['Petite S', 'Petite L'], minStockDays: 4.2, urgency: 1.8 },
                    { supplierCode: '6973', skc: 'sz25070853351948668', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/10/30/21/1761795799b727172e315b50dfec8583b13a0f0937.jpg', color: '酒红色', sizes: ['L'], minStockDays: 3.9, urgency: 1.7 },
                    { supplierCode: '6873', skc: 'sz25052724238238898', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/09/27/88/175894156090aaea815df29d823877ef66be14785d.jpg', color: '黑色', sizes: ['L'], minStockDays: 2.7, urgency: 0.8 },
                    { supplierCode: '6924', skc: 'sz25072999002490044', picUrl: 'https://img.ltwebstatic.com/v4/j/spmp/2025/12/05/c9/176490246194cd1a8198e1675e57eab1fda16bbda1.jpg', color: '咖啡棕', sizes: ['L'], minStockDays: 3.2, urgency: 0.5 }
                ].map(item => ({...item, shop: 'saoyangyu', type: 'low'}))
            }
        };
        
        let currentShop = 'all';
        let currentStatus = 'all';
        
        function getStatus(skc) {
            return statusData[skc] || { production: null, warehouse: null };
        }
        
        function saveStatus() {
            localStorage.setItem('skc_status', JSON.stringify(statusData));
        }
        
        function updateStatus(skc, type, name, note) {
            if (!statusData[skc]) statusData[skc] = { production: null, warehouse: null };
            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
            if (type === 'production') {
                statusData[skc].production = { name, note, time: timeStr };
            } else {
                statusData[skc].warehouse = { name, note, time: timeStr };
            }
            saveStatus();
        }
        
        function renderAll() {
            renderStats();
            renderCards('out');
            renderCards('low');
        }
        
        function renderStats() {
            let pending = 0, production = 0, complete = 0;
            ['urerem', 'saoyangyu'].forEach(shop => {
                [...allData[shop].out, ...allData[shop].low].forEach(item => {
                    const status = getStatus(item.skc);
                    if (status.warehouse) complete++;
                    else if (status.production) production++;
                    else pending++;
                });
            });
            document.getElementById('stats').innerHTML = `
                <div class="stat-card"><div class="num">${pending}</div><div class="label">待处理</div></div>
                <div class="stat-card"><div class="num">${production}</div><div class="label">生产中</div></div>
                <div class="stat-card"><div class="num">${complete}</div><div class="label">已完成</div></div>
            `;
        }
        
        function getFilteredItems(type) {
            let items = currentShop === 'all' 
                ? [...allData.urerem[type], ...allData.saoyangyu[type]]
                : allData[currentShop][type];
            
            if (currentStatus !== 'all') {
                items = items.filter(item => {
                    const status = getStatus(item.skc);
                    if (currentStatus === 'complete') return status.warehouse;
                    if (currentStatus === 'production') return status.production && !status.warehouse;
                    return !status.production && !status.warehouse;
                });
            }
            return items;
        }
        
        function renderCards(type) {
            const items = getFilteredItems(type);
            document.getElementById(`count-${type}`).textContent = `${items.length} 款`;
            document.getElementById(`cards-${type}`).innerHTML = items.length 
                ? items.map(item => renderCard(item)).join('')
                : '<div class="empty-state" style="grid-column:1/-1"><div class="icon">📭</div><div>暂无数据</div></div>';
        }
        
        function renderCard(item) {
            const status = getStatus(item.skc);
            const isProduction = status.production !== null;
            const isComplete = status.warehouse !== null;
            
            let cardClass = item.type === 'out' ? 'out' : 'low';
            if (isProduction && !isComplete) cardClass = 'production';
            if (isComplete) cardClass = 'complete';
            
            const valueLabel = item.type === 'out' ? '损失' : '紧急';
            const value = item.type === 'out' ? item.lossSales.toFixed(1) : (item.urgency || 0).toFixed(1);
            
            const imgHtml = item.picUrl 
                ? `<img class="card-img" src="${item.picUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : '';
            const placeholderHtml = `<div class="card-img-placeholder" style="${item.picUrl ? 'display:none' : ''}">无图片</div>`;
            
            let pBtnText = isProduction && !isComplete ? '✓ 生产完成' : '🏭 生产完成';
            let wBtnText = '📦 仓库完成';
            if (isComplete) {
                pBtnText = '✓ 生产完成';
                wBtnText = '✓ 全部完成';
            }
            
            let logHtml = '';
            if (status.production) {
                logHtml += `<div class="log-item">🏭 ${status.production.name} ${status.production.time}</div>`;
            }
            if (status.warehouse) {
                logHtml += `<div class="log-item">📦 ${status.warehouse.name} ${status.warehouse.time}</div>`;
            }
            
            return `
                <div class="card ${cardClass}">
                    ${isComplete ? '' : `<span class="${item.type === 'out' ? 'card-loss' : 'card-urgency'}">${value} ${valueLabel}</span>`}
                    ${imgHtml}${placeholderHtml}
                    <div class="card-code">[${SHOPS[item.shop]}] ${item.supplierCode}</div>
                    <div class="card-color">${item.color}</div>
                    <div class="card-sizes">
                        <div class="card-sizes-label">${item.type === 'out' ? '断' : '预警'}码尺码</div>
                        <div class="card-sizes-value">${item.sizes.join(', ')}</div>
                    </div>
                    ${item.minStockDays ? `<div style="color:#fa8c16;font-size:12px;margin-top:5px">⏰ 剩余 ${item.minStockDays} 天</div>` : ''}
                    <div class="card-actions">
                        <div class="action-row">
                            <span class="action-label">🏭 生产</span>
                            <button class="action-btn ${isProduction && !isComplete ? 'done' : ''}" 
                                onclick="openModal('${item.skc}', 'production')"
                                ${isComplete ? 'disabled' : ''}>${pBtnText}</button>
                        </div>
                        <div class="action-row">
                            <span class="action-label">📦 仓库</span>
                            <button class="action-btn ${isComplete ? 'done' : ''}"
                                onclick="openModal('${item.skc}', 'warehouse')"
                                ${!isProduction || isComplete ? 'disabled' : ''}>${wBtnText}</button>
                        </div>
                        <div class="card-note">
                            <input type="text" class="note-input" placeholder="备注（选填）" 
                                value="${status.production?.note || ''}"
                                onchange="updateNote('${item.skc}', this.value)">
                        </div>
                    </div>
                    ${logHtml ? `<div class="card-log">${logHtml}</div>` : ''}
                </div>
            `;
        }
        
        function openModal(skc, type) {
            currentAction = { skc, type };
            document.getElementById('modalTitle').textContent = type === 'production' ? '确认生产完成' : '确认仓库完成';
            document.getElementById('confirmName').value = '';
            document.getElementById('confirmNote').value = '';
            document.getElementById('confirmModal').classList.add('show');
            document.getElementById('confirmName').focus();
        }
        
        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            currentAction = null;
        }
        
        function confirmAction() {
            const name = document.getElementById('confirmName').value.trim();
            const note = document.getElementById('confirmNote').value.trim();
            if (!name) { alert('请输入名字'); return; }
            
            updateStatus(currentAction.skc, currentAction.type, name, note);
            closeModal();
            renderAll();
        }
        
        function updateNote(skc, note) {
            if (!statusData[skc]) statusData[skc] = { production: null, warehouse: null };
            if (statusData[skc].production) {
                statusData[skc].production.note = note;
            } else {
                if (!statusData[skc].production) statusData[skc].production = { name: '', time: '' };
                statusData[skc].production.note = note;
            }
            saveStatus();
        }
        
        // 筛选事件
        document.querySelectorAll('.shop-tab').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.shop-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentShop = btn.dataset.shop;
                renderAll();
            };
        });
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentStatus = btn.dataset.status;
                renderAll();
            };
        });
        
        // 初始化
        allData = EMBEDDED_DATA;
        renderAll();
    </script>
</body>
</html>
