<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>断货预警 - 测试</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:sans-serif;padding:20px;background:#f5f5f5}
        .header{background:#667eea;color:white;padding:15px;border-radius:8px;margin-bottom:20px}
        .card{border:2px solid #ff4d4f;background:#fff1f0;padding:10px;margin:5px;border-radius:6px;display:inline-block;width:120px}
        .card img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px}
        .stat{background:white;padding:10px;margin:5px;display:inline-block;border-radius:6px;text-align:center}
        h2{color:#333;margin:15px 0 10px}
    </style>
</head>
<body>
    <div class="header">
        <h1>SHEIN OBM 断货预警</h1>
        <p>UREEM: 8断货 25预警 | SAOYANGYU: 1断货 4预警</p>
    </div>
    
    <h2>断货 (9款)</h2>
    <div id="out-list"></div>
    
    <h2>预警 (29款)</h2>
    <div id="low-list"></div>
    
    <script>
        var data = {
            out: [
                {shop:"UREEM",code:"W05301",color:"白色",size:"0XL,1XL",loss:5.1,img:"https://img.ltwebstatic.com/v4/j/spmp/2025/04/07/c6/1744012371deadc89dffd73cc7aec45ec787b91efe.jpg"},
                {shop:"UREEM",code:"6605",color:"多色",size:"XL",loss:3.9,img:"https://img.ltwebstatic.com/images3_spmp/2025/02/26/4c/1740556595108f526144e2a4d240521a05b5710ac1.jpg"},
                {shop:"SAOYANGYU",code:"6973",color:"紫色",size:"XS,M,XXL",loss:2.8,img:"https://img.ltwebstatic.com/v4/j/spmp/2026/01/17/25/176861555073007f34108eacb9b8a96722a8befd5b.jpg"},
                {shop:"UREEM",code:"7201",color:"多色",size:"M",loss:2.0,img:"https://img.ltwebstatic.com/v4/j/spmp/2026/03/11/00/17732142103d6f79669264822acab7697722126944.jpg"},
                {shop:"UREEM",code:"6738",color:"黑色",size:"M,XL",loss:1.9,img:"https://img.ltwebstatic.com/v4/j/spmp/2025/09/26/a5/17588748796489251ca6a25b29c2828e5486ea7830.jpg"}
            ],
            low: [
                {shop:"UREEM",code:"6738",color:"卡其色",size:"S,M,L",days:0.1,urg:20.5,img:"https://img.ltwebstatic.com/images3_spmp/2025/03/20/90/17424682868778eebc47d143030072407e59974810.jpg"},
                {shop:"SAOYANGYU",code:"6924",color:"黑色",size:"Petite XS,Pettite M",days:0.5,urg:4.7,img:"https://img.ltwebstatic.com/v4/j/spmp/2026/03/31/71/1774951565136ee53c5ec0c90e89a93e1da0914925.jpg"},
                {shop:"UREEM",code:"6597-大码",color:"黑白色",size:"1XL",days:0.2,urg:4.7,img:"https://img.ltwebstatic.com/images3_spmp/2024/08/08/7f/1723083283994f0e4ece4505792e1c66f225d65c2c.jpg"}
            ]
        };
        
        function render() {
            var outHtml = '';
            data.out.forEach(function(item) {
                outHtml += '<div class="card"><span style="background:#ff4d4f;color:white;padding:2px 4px;border-radius:3px;font-size:11px">'+item.loss+'</span><br>'+
                    '<img src="'+item.img+'" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>无图</text></svg>\">'+
                    '<br><b>['+item.shop+'] '+item.code+'</b><br>'+item.color+'<br>'+item.size+'</div>';
            });
            document.getElementById('out-list').innerHTML = outHtml;
            
            var lowHtml = '';
            data.low.forEach(function(item) {
                lowHtml += '<div class="card" style="border-color:#fa8c16;background:#fff7e6"><span style="background:#fa8c16;color:white;padding:2px 4px;border-radius:3px;font-size:11px">'+item.urg+'</span><br>'+
                    '<img src="'+item.img+'" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23999%22 font-size=%2212%22>无图</text></svg>\">'+
                    '<br><b>['+item.shop+'] '+item.code+'</b><br>'+item.color+'<br>'+item.size+'</div>';
            });
            document.getElementById('low-list').innerHTML = lowHtml;
        }
        
        render();
    </script>
</body>
</html>
